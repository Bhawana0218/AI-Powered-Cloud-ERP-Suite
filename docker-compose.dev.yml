services:

  # ==========================================================
  # PostgreSQL Database
  # ==========================================================
  postgres:
    image: postgres:17-alpine
    container_name: enterprise-erp-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: enterprise_erp

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================
  # Redis Cache
  # ==========================================================
  redis:
    image: redis:7-alpine
    container_name: enterprise-erp-redis

    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    command: redis-server --appendonly yes

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================
  # pgAdmin - PostgreSQL Dashboard
  # ==========================================================
  pgadmin:
    image: dpage/pgadmin4
    container_name: enterprise-erp-pgadmin

    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erp.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

  # ==========================================================
  # MailHog - Email Testing
  # ==========================================================
  mailhog:
    image: mailhog/mailhog
    container_name: enterprise-erp-mailhog

    restart: unless-stopped

    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  redis_data:
